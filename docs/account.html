<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — Zapenda</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="account">
<div id="nav-mount"></div>
<section class="section bg-light">
  <div class="container">
    <div style="max-width:520px;margin:0 auto">
      <div style="text-align:center;margin-bottom:32px">
        <span style="font-family:var(--font-heading);font-size:3rem;font-style:italic;color:var(--hot-pink);display:block;margin-bottom:6px">Zapenda</span>
        <p style="color:var(--gray)">Fashion rooted in love, culture &amp; community</p>
      </div>
      <div style="background:white;border:1px solid var(--border);border-radius:16px;padding:36px">
        <div class="auth-tabs">
          <button class="auth-tab active" data-tab="signin" onclick="switchTab('signin')">Sign In</button>
          <button class="auth-tab" data-tab="create" onclick="switchTab('create')">Create Account</button>
        </div>

        <div class="auth-form active" data-form="signin">
          <form onsubmit="event.preventDefault();showToast('Signed in successfully! Welcome back 💖')">
            <div style="display:flex;flex-direction:column;gap:16px">
              <div class="form-field"><label>Email <span style="color:var(--hot-pink)">*</span></label><input type="email" placeholder="your@email.com" required></div>
              <div class="form-field"><label>Password <span style="color:var(--hot-pink)">*</span></label><input type="password" placeholder="••••••••" required></div>
              <label style="display:flex;align-items:center;gap:8px;font-size:13px;color:var(--gray);cursor:pointer"><input type="checkbox"> Email me with news and offers</label>
              <p style="font-size:12px;color:var(--gray);line-height:1.65">By continuing, you agree to our <a href="privacy-policy.html" style="color:var(--hot-pink);text-decoration:underline">Privacy Policy</a> and <a href="refund-policy.html" style="color:var(--hot-pink);text-decoration:underline">Refund Policy</a>.</p>
              <button type="submit" class="btn-primary" style="width:100%;padding:16px;justify-content:center">Sign In</button>
              <p style="text-align:center;font-size:13px;color:var(--gray)"><a href="#" style="color:var(--hot-pink)">Forgot your password?</a></p>
            </div>
          </form>
        </div>

        <div class="auth-form" data-form="create">
          <form onsubmit="event.preventDefault();showToast('Account created! Welcome to Zapenda! 💖')">
            <div style="display:flex;flex-direction:column;gap:16px">
              <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
                <div class="form-field"><label>First Name <span style="color:var(--hot-pink)">*</span></label><input type="text" placeholder="First name" required></div>
                <div class="form-field"><label>Last Name <span style="color:var(--hot-pink)">*</span></label><input type="text" placeholder="Last name" required></div>
              </div>
              <div class="form-field"><label>Email <span style="color:var(--hot-pink)">*</span></label><input type="email" placeholder="your@email.com" required></div>
              <div class="form-field"><label>Password <span style="color:var(--hot-pink)">*</span></label><input type="password" placeholder="Create a strong password" required></div>
              <label style="display:flex;align-items:center;gap:8px;font-size:13px;color:var(--gray);cursor:pointer"><input type="checkbox" checked> Email me with news and exclusive offers</label>
              <p style="font-size:12px;color:var(--gray);line-height:1.65">By creating an account, you agree to our <a href="privacy-policy.html" style="color:var(--hot-pink);text-decoration:underline">Privacy Policy</a> and <a href="terms-of-service.html" style="color:var(--hot-pink);text-decoration:underline">Terms of Service</a>.</p>
              <button type="submit" class="btn-primary" style="width:100%;padding:16px;justify-content:center">Create Account</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</section>
<div id="footer-mount"></div>
<div id="chat-mount"></div>
<div class="toast-container" id="toast-container"></div>
<script src="js/shared.js"></script>
<script>
function switchTab(tab) {
  document.querySelectorAll('.auth-tab').forEach(t => t.classList.toggle('active', t.dataset.tab===tab));
  document.querySelectorAll('.auth-form').forEach(f => f.classList.toggle('active', f.dataset.form===tab));
}
</script>
</body>
</html>
